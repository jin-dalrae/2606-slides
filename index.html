<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Slides</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell" data-sidebar-open="true">
      <aside class="slide-list" aria-label="Slide list">
        <div class="slide-list__header">
          <h1>Slides</h1>
          <button class="icon-button" id="closeSidebar" type="button" aria-label="Close slide list" title="Close slide list">
            <span aria-hidden="true">×</span>
          </button>
        </div>
        <ol class="slide-list__items" id="slideList"></ol>
      </aside>

      <main class="stage">
        <div class="stage__toolbar" aria-label="Presentation controls">
          <button class="icon-button sidebar-toggle" id="openSidebar" type="button" aria-label="Open slide list" title="Open slide list">
            <span aria-hidden="true">☰</span>
          </button>
          <div class="stage__counter" id="slideCounter" aria-live="polite"></div>
          <div class="stage__controls">
            <button class="icon-button" id="prevSlide" type="button" aria-label="Previous slide" title="Previous slide">
              <span aria-hidden="true">‹</span>
            </button>
            <button class="icon-button" id="nextSlide" type="button" aria-label="Next slide" title="Next slide">
              <span aria-hidden="true">›</span>
            </button>
            <button class="icon-button" id="fullscreen" type="button" aria-label="Full screen" title="Full screen">
              <span aria-hidden="true">⛶</span>
            </button>
          </div>
        </div>

        <section class="slide" id="slide" tabindex="0" aria-live="polite"></section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
