<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Slides</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell" data-sidebar-open="true">
      <aside class="presentation-list" aria-label="Presentation list">
        <div class="presentation-list__header">
          <button class="sidebar-home-link" id="homeLink" type="button">Rae Jin Slides</button>
          <button class="icon-button" id="closeSidebar" type="button" aria-label="Close presentation list" title="Close presentation list">
            <span aria-hidden="true">‹</span>
          </button>
        </div>
        <ol class="presentation-list__items" id="presentationList"></ol>
        <div class="sidebar-tools">
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="Switch to light theme">
            <span class="theme-toggle__dot" aria-hidden="true"></span>
            <span class="theme-toggle__label">Light</span>
          </button>
        </div>
      </aside>

      <main class="stage">
        <header class="presentation-header">
          <div class="stage__controls">
            <button class="icon-button sidebar-toggle" id="openSidebar" type="button" aria-label="Open presentation list" title="Open presentation list">
              <span aria-hidden="true">☰</span>
            </button>
          </div>
          <div class="presentation-header__title">
            <p id="presentationDate"></p>
            <h2 id="presentationTitle"></h2>
          </div>
          <div class="stage__controls" aria-label="Presentation controls">
            <label class="select-control" for="transitionSelect">
              <span>Transition</span>
              <select id="transitionSelect">
                <option value="slide">Slide</option>
                <option value="fade">Fade</option>
                <option value="convex">Convex</option>
                <option value="concave">Concave</option>
                <option value="zoom">Zoom</option>
                <option value="none">None</option>
              </select>
            </label>
            <label class="select-control" for="backgroundSelect">
              <span>Background</span>
              <select id="backgroundSelect">
                <option value="shader">Shader</option>
                <option value="plain">Plain</option>
                <option value="ivory">Ivory</option>
                <option value="gray">Gray</option>
              </select>
            </label>
            <button class="text-button" id="editDeck" type="button" aria-label="Edit this deck" title="Edit this deck">
              Edit
            </button>
            <button class="icon-button" id="prevSlide" type="button" aria-label="Previous slide" title="Previous slide">
              <span aria-hidden="true">‹</span>
            </button>
            <button class="icon-button" id="nextSlide" type="button" aria-label="Next slide" title="Next slide">
              <span aria-hidden="true">›</span>
            </button>
            <button class="icon-button" id="fullscreen" type="button" aria-label="Full screen" title="Full screen">
              <span aria-hidden="true">⛶</span>
            </button>
          </div>
        </header>

        <div class="presentation-workspace">
          <nav class="slide-list" aria-label="Slides in this presentation">
            <div class="slide-list__header">
              <h3>Slides</h3>
              <span id="slideCounter" aria-live="polite"></span>
            </div>
            <ol class="slide-list__items" id="slideList"></ol>
          </nav>

          <section class="slide" id="slide" tabindex="0" aria-live="polite"></section>
        </div>

        <footer class="site-footer">All rights reserved by Rae Jin 2026</footer>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/markdown/markdown.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5/plugin/notes/notes.js"></script>
    <script src="script.js"></script>
  </body>
</html>
